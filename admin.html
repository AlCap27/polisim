<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoliSim — Admin Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#faf9f7;--bg2:#f0ede8;--black:#0a0a0a;--ink:#1a1a1a;
  --mid:#555;--light:#888;--ghost:#bbb;--border:#e0dbd4;--border2:#d0cbc4;
  --blue:#1e3a5f;--blue-light:#4a7eb5;--blue-dim:#e8f0f8;
  --green:#1a4a2a;--green-dim:#e8f4ec;--red:#7b1a1a;--red-dim:#fdf0ee;
  --font-sans:"DM Sans",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",monospace;
}
body{background:var(--bg);color:var(--ink);font-family:var(--font-sans);font-size:13px;min-height:100vh}

/* GATE */
#gate{position:fixed;inset:0;background:var(--bg);z-index:1000;display:flex;align-items:center;justify-content:center}
.gate-box{width:360px;text-align:center;padding:48px 40px;border:0.5px solid var(--border)}
.gate-title{font-family:var(--font-mono);font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;color:var(--black)}
.gate-input{width:100%;background:#fff;border:0.5px solid var(--border2);color:var(--ink);padding:12px 14px;font-family:var(--font-mono);font-size:13px;letter-spacing:2px;outline:none;margin-bottom:10px;text-align:center}
.gate-input:focus{border-color:var(--black)}
.gate-btn{width:100%;padding:13px;background:var(--black);color:var(--bg);border:none;cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.gate-err{font-family:var(--font-mono);font-size:10px;color:#b05040;margin-top:8px;min-height:14px}

/* APP */
#app{display:none}
.nav{padding:0 40px;height:56px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:10}
.nav-logo{font-family:var(--font-mono);font-size:11px;letter-spacing:3px;color:var(--black);text-decoration:none;text-transform:uppercase}
.nav-logo span{color:var(--blue)}
.nav-meta{font-family:var(--font-mono);font-size:9px;color:var(--light);letter-spacing:1px}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border-bottom:0.5px solid var(--border)}
.stat{background:var(--bg);padding:16px 20px;text-align:center}
.stat-n{font-family:var(--font-mono);font-size:22px;color:var(--black)}
.stat-l{font-family:var(--font-mono);font-size:8px;letter-spacing:1px;color:var(--light);text-transform:uppercase;margin-top:3px}

/* FILTERS */
.filters{padding:12px 40px;border-bottom:0.5px solid var(--border);display:flex;gap:12px;align-items:center;background:var(--bg2)}
.filter-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--light);text-transform:uppercase}
.filter-select{background:#fff;border:0.5px solid var(--border2);padding:6px 10px;font-family:var(--font-mono);font-size:10px;color:var(--ink);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--black)}
.filter-input{background:#fff;border:0.5px solid var(--border2);padding:6px 10px;font-family:var(--font-mono);font-size:10px;color:var(--ink);outline:none;width:180px}
.btn-refresh{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;background:var(--black);color:var(--bg);border:none;padding:7px 16px;cursor:pointer;margin-left:auto}
.btn-refresh:hover{opacity:.85}

/* TABLE */
.table-wrap{padding:24px 40px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-family:var(--font-mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--light);padding:8px 12px;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:0.5px solid var(--border);color:var(--mid);vertical-align:top}
tr:hover td{background:var(--bg2)}
td.mono{font-family:var(--font-mono);font-size:10px}
.badge{display:inline-block;font-family:var(--font-mono);font-size:8px;letter-spacing:1px;padding:2px 7px;text-transform:uppercase}
.badge-sim{background:var(--blue-dim);color:var(--blue)}
.badge-opt{background:var(--green-dim);color:var(--green)}
.badge-val{background:#fdf5e8;color:#7a4a00}

/* EMPTY */
.empty{text-align:center;padding:60px;font-family:var(--font-mono);font-size:11px;color:var(--ghost);letter-spacing:1px}
.loading{text-align:center;padding:40px;font-family:var(--font-mono);font-size:10px;color:var(--light);letter-spacing:2px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-title">PoliSim · Admin</div>
    <input class="gate-input" id="gate-pwd" type="password" placeholder="Admin token"
           onkeydown="if(event.key==='Enter')login()">
    <button class="gate-btn" onclick="login()">Accedi →</button>
    <div class="gate-err" id="gate-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="nav">
    <a class="nav-logo" href="/"><span>POLI</span>SIM · Admin</a>
    <span class="nav-meta" id="nav-meta">—</span>
  </nav>

  <div class="stats-bar" id="stats-bar">
    <div class="stat"><div class="stat-n" id="s-tot">—</div><div class="stat-l">Totale simulazioni</div></div>
    <div class="stat"><div class="stat-n" id="s-oggi">—</div><div class="stat-l">Oggi</div></div>
    <div class="stat"><div class="stat-n" id="s-settimana">—</div><div class="stat-l">Settimana</div></div>
    <div class="stat"><div class="stat-n" id="s-pol">—</div><div class="stat-l">Politico</div></div>
    <div class="stat"><div class="stat-n" id="s-civic">—</div><div class="stat-l">Civic/ONG</div></div>
  </div>

  <div class="filters">
    <span class="filter-label">Tipo</span>
    <select class="filter-select" id="f-tipo" onchange="renderTable()">
      <option value="">Tutti</option>
      <option value="simulate">Simulate</option>
      <option value="optimize">Optimize</option>
      <option value="valuta">Valuta coerenza</option>
    </select>
    <span class="filter-label">Tester</span>
    <select class="filter-select" id="f-tester" onchange="renderTable()">
      <option value="">Tutti</option>
      <option value="Consulente politico">Consulente politico</option>
      <option value="ONG / Advocacy">ONG</option>
      <option value="Ente civico / Sindacato">Ente civico</option>
    </select>
    <span class="filter-label">Cerca</span>
    <input class="filter-input" id="f-search" placeholder="IP, tema, segmento..."
           oninput="renderTable()">
    <button class="btn-refresh" onclick="loadLogs()">↺ Aggiorna</button>
  </div>

  <div class="table-wrap">
    <div class="loading" id="loading">Caricamento log...</div>
    <table id="log-table" style="display:none">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Tipo</th>
          <th>Tester</th>
          <th>Dominio / Tema</th>
          <th>Segmento</th>
          <th>IP</th>
        </tr>
      </thead>
      <tbody id="log-body"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Nessun log trovato</div>
  </div>
</div>

<script>
const API = 'https://api.polisim.dev';
let token = '';
let allLogs = [];

function login() {
  const pwd = document.getElementById('gate-pwd').value.trim();
  if (!pwd) return;
  token = pwd;
  loadLogs();
}

async function loadLogs() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('log-table').style.display = 'none';
  document.getElementById('empty').style.display = 'none';

  try {
    const res = await fetch(`${API}/api/logs?token=${encodeURIComponent(token)}&limit=500`);
    const d = await res.json();
    if (d.detail === 'Non autorizzato') {
      document.getElementById('gate-err').textContent = 'Token non valido';
      setTimeout(() => document.getElementById('gate-err').textContent = '', 2500);
      document.getElementById('loading').style.display = 'none';
      return;
    }
    // Login OK
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    allLogs = d.logs || [];
    updateStats();
    renderTable();
    document.getElementById('nav-meta').textContent = 
      `${d.totale} log totali · aggiornato ${new Date().toLocaleTimeString('it-IT')}`;
  } catch(e) {
    document.getElementById('gate-err').textContent = 'Errore di connessione';
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

function updateStats() {
  const oggi = new Date().toISOString().slice(0,10);
  const settimanaFa = new Date(Date.now() - 7*24*60*60*1000).toISOString().slice(0,10);
  
  document.getElementById('s-tot').textContent = allLogs.length;
  document.getElementById('s-oggi').textContent = 
    allLogs.filter(l => l.ts && l.ts.slice(0,10) === oggi).length;
  document.getElementById('s-settimana').textContent = 
    allLogs.filter(l => l.ts && l.ts.slice(0,10) >= settimanaFa).length;
  document.getElementById('s-pol').textContent = 
    allLogs.filter(l => l.tester === 'Consulente politico').length;
  document.getElementById('s-civic').textContent = 
    allLogs.filter(l => l.tester && l.tester !== 'Consulente politico').length;
}

function renderTable() {
  const tipo = document.getElementById('f-tipo').value;
  const tester = document.getElementById('f-tester').value;
  const search = document.getElementById('f-search').value.toLowerCase();

  let filtered = allLogs.filter(l => {
    if (tipo && !l.tipo?.includes(tipo)) return false;
    if (tester && l.tester !== tester) return false;
    if (search) {
      const hay = JSON.stringify(l).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  const tbody = document.getElementById('log-body');
  
  if (!filtered.length) {
    document.getElementById('log-table').style.display = 'none';
    document.getElementById('empty').style.display = 'block';
    return;
  }

  tbody.innerHTML = filtered.map(l => {
    const ts = l.ts ? l.ts.replace('T',' ').slice(0,16) : '—';
    const tipoBadge = l.tipo?.includes('simulate') 
      ? `<span class="badge badge-sim">${l.tipo}</span>`
      : l.tipo?.includes('optimize') 
        ? `<span class="badge badge-opt">${l.tipo}</span>`
        : `<span class="badge badge-val">${l.tipo||'—'}</span>`;
    const tema = [l.tema, l.dominio].filter(Boolean).join(' · ') || '—';
    return `<tr>
      <td class="mono">${ts}</td>
      <td>${tipoBadge}</td>
      <td>${l.tester || '—'}</td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${tema}">${tema}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.segmento || '—'}</td>
      <td class="mono">${l.ip || '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('log-table').style.display = 'table';
  document.getElementById('empty').style.display = 'none';
}
</script>
</body>
</html>
